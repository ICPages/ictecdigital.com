<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Próximamente | IC TecDigital</title>
    <link rel="icon" type="image/x-icon" href="Logo.webp">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Roboto Mono', monospace;
            background: linear-gradient(135deg, #092a62, #77b800, #092a62);
            background-size: 300% 300%;
            animation: gradientMove 8s ease infinite;
            color: #fefefe;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            padding: 20px;
        }

        img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            box-shadow: 0px 0px 15px #77b800;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1rem;
            max-width: 500px;
            margin: auto;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 15px;
            text-decoration: none;
            background-color: #77b800;
            color: #092a62;
            font-weight: bold;
            transition: 0.3s ease;
        }

        .btn:hover {
            background-color: #fefefe;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="container">
        <img src="Logo.webp" alt="IC TecDigital">

        <h1>Próximamente</h1>

        <p>
            Estamos trabajando en esta sección para ofrecerte contenido y servicios de calidad.
            Muy pronto estará disponible.
        </p>

        <p>
            Mientras tanto, puedes contactarnos para más información o solicitar alguno de nuestros servicios.
        </p>

        <a href="https://wa.me/522221106016?text=¡Hola%20*IC%20TecDigital*!%20Me%20gustaría%20recibir%20más%20información%20sobre:%20"
           target="_blank" class="btn">
            Contactar por WhatsApp
        </a>
    </div>

</body>
</html>
